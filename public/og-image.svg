<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent bar -->
  <rect x="60" y="0" width="4" height="630" fill="url(#accent)"/>
  <!-- Logo/Brand -->
  <text x="100" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="54" font-weight="700" fill="#ffffff">Radulator</text>
  <text x="100" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8">Radiology Calculators</text>
  <!-- Tagline -->
  <text x="100" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#e2e8f0">Evidence-Based Medical Calculators</text>
  <text x="100" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94a3b8">38 calculators across 11 specialties</text>
  <!-- Badge -->
  <rect x="100" y="420" width="280" height="50" rx="25" fill="none" stroke="#06b6d4" stroke-width="2"/>
  <text x="240" y="453" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#06b6d4" text-anchor="middle">Free · Peer-Reviewed</text>
  <!-- Calculator icons (simplified) -->
  <g transform="translate(700, 180)" opacity="0.15">
    <rect x="0" y="0" width="400" height="300" rx="16" fill="#06b6d4"/>
    <rect x="40" y="40" width="320" height="40" rx="8" fill="#ffffff" opacity="0.8"/>
    <rect x="40" y="100" width="220" height="40" rx="8" fill="#ffffff" opacity="0.6"/>
    <rect x="40" y="160" width="260" height="40" rx="8" fill="#ffffff" opacity="0.6"/>
    <rect x="40" y="220" width="120" height="50" rx="8" fill="#3b82f6" opacity="0.9"/>
  </g>
</svg>
