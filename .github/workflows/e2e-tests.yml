name: E2E Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      full_suite:
        description: 'Run full test suite (takes 2+ hours)'
        required: false
        default: 'false'
        type: boolean

jobs:
  smoke-tests:
    name: Smoke Tests
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test tests/e2e/smoke.spec.js --project=chromium
        env:
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-report
          path: playwright-report/
          retention-days: 7


  targeted-tests:
    name: Targeted Calculator Tests
    if: github.event_name == 'pull_request'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Coverage gate: every calculator must have a dedicated spec whose
      # navigation target resolves against CURRENT registry metadata. Fails on
      # new untested calculators AND on specs orphaned by renames.
      - name: Spec coverage check
        run: node scripts/spec-map.js --check

      - name: Detect changed targeted specs
        id: changed
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'src/components/calculators/*.jsx' | grep -vE 'index|registry|FeedbackForm' || true)
          # Spec-only PRs do not change calculator source, so run their changed
          # specs directly. If source and specs both changed, the run step
          # unions these paths with spec-map output.
          CHANGED_SPECS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- 'tests/e2e/*.spec.js' 'tests/e2e/**/*.spec.js' | sort -u || true)
          # Space-joined single line: a multiline output would embed raw
          # newlines into the github-expression substitution downstream, acting
          # as command separators inside command substitution and silently
          # dropping all but the first file's specs (gate finding, PR #17).
          # NOTE: never write a literal dollar-double-brace expression in these
          # comments — Actions template-expands run blocks before the shell
          # sees them, and an empty expression fails the whole workflow file.
          CHANGED_SPACE=$(printf '%s' "$CHANGED" | tr '\n' ' ')
          SPECS_SPACE=$(printf '%s' "$CHANGED_SPECS" | tr '\n' ' ')
          echo "files=$CHANGED_SPACE" >> "$GITHUB_OUTPUT"
          echo "spec_files=$SPECS_SPACE" >> "$GITHUB_OUTPUT"
          if [ -n "$CHANGED" ] || [ -n "$CHANGED_SPECS" ]; then echo "any=true" >> "$GITHUB_OUTPUT"; else echo "any=false" >> "$GITHUB_OUTPUT"; fi

      - name: Setup Node
        if: steps.changed.outputs.any == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.changed.outputs.any == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.changed.outputs.any == 'true'
        run: npx playwright install --with-deps chromium

      # Playwright's CI webServer is `vite preview`, which serves an existing
      # dist/ and never builds. Without this step the server never comes up
      # (120s timeout, zero tests run). Latent until the first PR touching
      # calculator source post-release-train (PR #30, 2026-06-12).
      - name: Build application
        if: steps.changed.outputs.any == 'true'
        run: npm run build

      - name: Run targeted specs
        if: steps.changed.outputs.any == 'true'
        run: |
          FILES="${{ steps.changed.outputs.files }}"
          CHANGED_SPECS="${{ steps.changed.outputs.spec_files }}"
          : > targeted-specs.txt

          if [ -n "$FILES" ]; then
            printf '%s\n' "$FILES" | xargs node scripts/spec-map.js --specs-for >> targeted-specs.txt
          fi

          if [ -n "$CHANGED_SPECS" ]; then
            printf '%s\n' "$CHANGED_SPECS" | tr ' ' '\n' >> targeted-specs.txt
          fi

          sort -u targeted-specs.txt | awk 'NF' > targeted-specs.unique.txt
          SPECS=$(tr '\n' ' ' < targeted-specs.unique.txt)
          if [ -z "$SPECS" ]; then
            echo "No targeted specs resolved; refusing to run an empty Playwright command."
            exit 1
          fi

          echo "Running targeted specs: $SPECS"
          npx playwright test $SPECS --project=chromium
        env:
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: targeted-test-report
          path: playwright-report/
          retention-days: 7

  full-tests:
    name: Full Test Suite
    # Auto-runs for every PR targeting main (promotion batches from develop
    # and hotfixes): production deploys only on a green full suite. Feature
    # PRs target develop and need only smoke + targeted.
    if: github.event.inputs.full_suite == 'true' || (github.event_name == 'pull_request' && github.base_ref == 'main')
    timeout-minutes: 180
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full test suite
        run: npx playwright test --project=chromium
        env:
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-test-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
